<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="example/example.css">
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/es6-promise/4.2.8/es6-promise.auto.min.js"></script>
    <script src="https://staxjs.staxpayments.com/staxjs-captcha.js"></script>
    <style>
        html,
        body {
            height: 38px;
            background-color: #e6e6e6;
        }
    </style>
</head>
<body>
    <style>
        .grecaptcha-badge {
            visibility: hidden;
        }
    </style>
    <form onsubmit="return false;">
        <div id="card-element" style="text-align: center;" class="field">
            <div id="fattjs-number" style="width: 180px; height: 35px; display: inline-block; margin: 3px"></div>
            <div id="fattjs-cvv" style="width: 50px; height: 35px; display: inline-block; margin: 3px"></div>
            <input name="month" size="3" maxlength="2" placeholder="MM" style="width: 40px; height: 35px; border-radius: 3px; border: 1px solid #ccc; padding: .5em .5em; font-size: 91%; margin: 3px" />
            /
            <input name="year" size="5" maxlength="4" placeholder="YYYY" style="width: 55px; height: 35px; border-radius: 3px; border: 1px solid #ccc; padding: .5em .5em; font-size: 91%; margin: 3px" />
        </div>
        <div style="text-align: center; padding-top: 10px;">
            <button id="tokenizebutton-card" type="button" disabled>Tokenize Card</button>
        </div>
        <div style="text-align: center; color: #4d4d4d; padding-top: 10px;">
            This site is protected by reCAPTCHA and the Google
            <a href="https://policies.google.com/privacy" target="_blank"><u>Privacy Policy</u></a> and <a href="https://policies.google.com/terms" target="_blank"><u>Terms of Service</u></a> apply.
        </div>
    </form>
    <script>
        var tokenizeButtonCard = document.querySelector("#tokenizebutton-card");
        var tokenizeButtonBank = document.querySelector("#tokenizebutton-bank");
        fattjs = new FattJs("Ultimate-Turf-cdc924459678", {
            number: {
                id: "fattjs-number",
                placeholder: "%creditcardnum%",
                style: "width: 90%; height:90%; border-radius: 3px; border: 1px solid #ccc; padding: .5em .5em; font-size: 91%;"
            },
            cvv: {
                id: "fattjs-cvv",
                placeholder: "000",
                style: "width: 30px; height:90%; border-radius: 3px; border: 1px solid #ccc; padding: .5em .5em; font-size: 91%;"
            }
        });
        // call init secure card input form into iFrame
        fattjs
            .showCardForm()
            .then(function (handler) {
                console.log("form loaded");
            })
            .catch(function (err) {
                console.log("error init form " + err);
            });
        fattjs.on("card_form_complete", function (message) {
            tokenizeButtonCard.disabled = false;
        });
        // fattjs.on("card_form_uncomplete", function (message) {
        //     tokenizeButtonCard.disabled = true;
        // });
       fattjs.on("card_form_incomplete", function (message) {
            tokenizeButtonCard.disabled = true;
        });
        tokenizeButtonCard.onclick = function () {
            var form = document.querySelector("form");
            var extraDetails = {
                firstname: "Jane",
                lastname: "Doe",
                month: form.querySelector("input[name=month]").value,
                year: form.querySelector("input[name=year]").value,
                phone: "+1 (111) 111-1111",
                address_1: "100 S Orange Ave",
                address_2: "",
                address_city: "Orlando",
                address_state: "FL",
                address_zip: "32811",
                address_country: "USA",
                url: "https://omni.fattmerchant.com/#/bill/",
                match_customer: false,
                method: 'card',
                validate: true,
                send_receipt: true,
                meta: {
                    reference: "test",
                    otherField1: "",
                    otherField2: ""
                }
            };
            fattjs.tokenize(extraDetails).then(function (result) {
                if (result) {
                    console.log("tokenize:", result);
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage({ Key: 2, Value: result });
                    }
                }
            }).catch(function (err) {
                console.log("tokenize error:", err);
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage({ Key: 3, Value: JSON.stringify(err) });
                }
            });
        };
        function TokennizeCard(details) {
            var deets = JSON.parse(details);
            var extraDetails = {
                firstname: deets.firstname,
                lastname: deets.lastname,
                total: deets.total,
                month: deets.exp.split(" ")[0],
                year: deets.exp.split(" ")[1],
                phone: deets.phone,
                address_1: deets.address1,
                address_2: deets.address2,
                address_city: deets.city,
                address_state: deets.state,
                address_zip: deets.zipcode,
                address_country: deets.country,
                email: deets.email,
                url: "https://omni.fattmerchant.com/#/bill/",
                match_customer: false,
                method: 'card',
                // validate is optional and can be true or false.
                // determines whether or not fattmerchant.js does client-side validation.
                // the validation follows the sames rules as the api.
                // check the api documentation for more info:
                // https://fattmerchant.com/api-documentation
                validate: true,
                send_receipt: true,
                meta: {
                    reference: deets.peachtree_id,
                    otherField1: deets.corp_id,
                    otherField2: deets.number
                }
            }
            fattjs.tokenize(extraDetails).then(function (result) {
                if (result) {
                    window.chrome.webview.postMessage({ Key: 2, Value: result });
                }
            }).catch(function (err) {
                window.chrome.webview.postMessage({ Key: 3, Value: JSON.stringify(err) });
            })
        }
        function handlePay(details) {
            var deets = JSON.parse(details);
            var extraDetails = {
                firstname: deets.firstname,
                lastname: deets.lastname,
                total: deets.total,
                month: deets.exp.split(" ")[0],
                year: deets.exp.split(" ")[1],
                phone: deets.phone,
                address_1: deets.address1,
                address_2: deets.address2,
                address_city: deets.city,
                address_state: deets.state,
                address_zip: deets.zipcode,
                address_country: deets.country,
                email: deets.email,
                url: "https://omni.fattmerchant.com/#/bill/",
                match_customer: false,
                method: 'card',
                // validate is optional and can be true or false.
                // determines whether or not fattmerchant.js does client-side validation.
                // the validation follows the sames rules as the api.
                // check the api documentation for more info:
                // https://fattmerchant.com/api-documentation/
                validate: true,
                meta: {
                    reference: deets.peachtree_id,
                    otherField1: deets.corp_id,
                    otherField2: deets.number
                }
            }
            fattjs.pay(extraDetails).then(function (result) {
                if (result) {
                    window.chrome.webview.postMessage({ Key: 1, Value: result });
                }
            }).catch(function (err) {
                window.chrome.webview.postMessage({ Key: 3, Value: JSON.stringify(err) });
            })
        }
    </script>
</body>
</html>
