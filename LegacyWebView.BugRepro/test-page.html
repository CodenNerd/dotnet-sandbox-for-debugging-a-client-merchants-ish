    <script>
        window.__pageStatus = "bootstrapping";
        window.__staxLoadState = "pending";
        window.__lastScriptError = "none";

        function reportDiag(level, message) {
            try {
                if (window.external && window.external.ReportDiag) {
                    window.external.ReportDiag(level, message);
                } else if (window.external && window.external.LogConsole) {
                    window.external.LogConsole(level, message);
                }
            } catch (e) { }

            var panel = document.getElementById("diag-status");
            if (panel) {
                var line = document.createElement("div");
                line.style.color = level === "error" ? "#b00020" : (level === "warn" ? "#b36b00" : "#1b5e20");
                line.textContent = "[" + level + "] " + message;
                panel.appendChild(line);
            }
        }

        (function installEarlyLogging() {
            ["log", "warn", "error", "info"].forEach(function (level) {
                var original = console[level];
                console[level] = function () {
                    var message = Array.prototype.slice.call(arguments).join(" ");
                    reportDiag(level, message);
                    original.apply(console, arguments);
                };
            });
        })();

        window.onerror = function (message, source, lineno, colno) {
            window.__lastScriptError = message + " at " + source + ":" + lineno;
            reportDiag("error", window.__lastScriptError);
            return true;
        };

        if (!window.chrome) window.chrome = {};
        if (!window.chrome.webview) {
            window.chrome.webview = {
                postMessage: function (msg) {
                    if (window.external && window.external.WebViewPostMessage) {
                        window.external.WebViewPostMessage(JSON.stringify(msg));
                    }
                }
            };
        }

        reportDiag("info", "Page bootstrap complete. Loading external scripts...");
        window.__pageStatus = "bootstrap-complete";
    </script>
